@LayoutPage BaseTemplate

<h2>Dataset @context.datasetName</h2>

  <table>

    <thead>
      <tr>
        @foreach (var field in dataset.Fields) {
          <th class="@field.DataType">@field.FieldName</th>
        }
      </tr>
    </thead>

    <tbody>
      @foreach (var record in dataset) {
        <tr>
          @foreach (var field in dataset.Fields) {
            <td class="@field.DataType">@if not (field.DataType = ftBlob) { @field.AsString }</td>
          }
        </tr>
      }
    </tbody>

  </table>
